<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記帳 App</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 16px; }
    h1 { text-align: center; margin-bottom: 16px; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .summary { display: flex; justify-content: space-around; text-align: center; }
    .summary div span { display: block; font-size: 22px; font-weight: bold; }
    .income { color: #2ecc71; }
    .expense { color: #e74c3c; }
    input, select { width: 100%; padding: 10px; margin: 6px 0 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .tx-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .tx-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <h1>💰 記帳 App</h1>

  <div class="card">
    <div class="summary">
      <div><span id="total-income" class="income">$0</span>收入</div>
      <div><span id="balance">$0</span>結餘</div>
      <div><span id="total-expense" class="expense">$0</span>支出</div>
    </div>
  </div>

  <div class="card">
    <select id="type">
      <option value="收入">收入</option>
      <option value="支出">支出</option>
    </select>
    <input type="number" id="amount" placeholder="金額">
    <input type="date" id="date">
    <input type="text" id="note" placeholder="備註（選填）">
    <button onclick="addTransaction()">新增</button>
  </div>

  <div class="card">
    <h3 style="margin-bottom:12px">紀錄</h3>
    <div id="tx-list">載入中...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
